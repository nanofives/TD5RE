[Display]
Width = 640
Height = 480
Windowed = 1
Borderless = 1
Fogging = 0
SpeedUnits = 1
CameraDamping = 5

[Audio]
SFXVolume = 10
MusicVolume = 80
SFXMode = 0

[GameOptions]
Laps = 0
CheckpointTimers = 1
Traffic = 1
Cops = 1
Difficulty = 1
Dynamics = 0
Collisions = 1
; AutoGearbox: 1 = automatic transmission (default, mirrors orig Quick Race
; default; gear up/down keys are ignored). 0 = manual (player gear keys are
; honored, mirrors orig manual-toggle state). Drives input bit 28 →
; actor+0x378 which UpdatePlayerVehicleControlState gates the gear-shift
; block on. The original's menu toggle is not wired in the port, so this
; INI key is the only way to switch.
AutoGearbox = 1
PlayerIsAI = 1

[Game]
DefaultCar = 0
DefaultTrack = 1
DefaultGameType = 0
SkipIntro = 1
DebugOverlay = 1
AutoRace = 1
StartSpanOffset = 0

[Trace]
RaceTrace = 0
RaceTraceSlot = 0
RaceTraceMaxFrames = 0
AutoThrottle = 0
TraceFastForward = 1
RaceTraceMaxSimTicks = 0
; Whole-state per-tick snapshot (re/analysis/whole_state_diff_design.md).
; Independent of RaceTrace -- captures the full 6 x 0x388 actor array plus
; a 128-byte globals blob each sim tick to log/whole_state_port.bin.
; Diff against original via tools/diff_whole_state.py.
WholeState = 0
WholeStateMaxTicks = 600
; ExperimentalBiasClamp: enable the per-slot ClassifyTrackOffsetClamp +
; bias-rewrite + boundary writeback chain ported from UpdateRaceActors
; @ 0x00436A70. Default 0 (current behaviour). 1 = run the full pre-loop
; body byte-faithfully against the original — see td5_ai.c.
ExperimentalBiasClamp = 0
; Modules: comma-separated subset of
;   frame,pose,motion,track,controls,progress,view,calls
; (or "*" for all). /fix passes a narrowed list per fix-task focus.
Modules = *
; Stages: comma-separated subset of
;   frame_begin,pre_physics,post_physics,post_ai,post_track,
;   post_camera,post_progress,frame_end,pause_menu,countdown
; (or "*" for all).
Stages = *

; Snapshot-replay harness (td5_trace_replay.{c,h}; tools/run_state_replay.py).
; off  = harness disabled (default)
; dump = append port state to log/port_state_snapshot.bin each sub-tick
; inject = read orig state from tools/frida_csv/state_snapshot_original.bin
;          and overwrite port actors + RS table each sub-tick
; both = inject orig[N] then dump port_state[N] (the differential mode used
;        by tools/diff_replay_frames.py).
StateReplayMode = off
StateReplayStartFrame = 0
StateReplayEndFrame = 0
StateReplayMaxFrames = 200

[Logging]
Enabled = 1
MinLevel = 0
Frontend = 0
Race = 1
Engine = 0
Wrapper = 0

; ============================================================================
;  td5re.ini — TD5RE source-port configuration (DEV build: td5re.exe)
; ----------------------------------------------------------------------------
;  This file holds every tweakable SETTING. The binary Config.td5 / CupData.td5
;  save files have been retired; their data now lives in organized, editable
;  sibling files next to the executable:
;
;     td5re_input.ini      controller + keyboard bindings, device / FF config
;     td5re_progress.ini   high-score table, unlock / cheat / progression state
;     td5re_cup.ini        "Continue Cup" resume state
;
;  An existing Config.td5 / CupData.td5 is imported ONCE on first launch and
;  then renamed to *.migrated (kept as a backup, never read again).
;
;  Precedence for the keys below: CLI --Key=N  >  this file  >  built-in default.
;  The shipping build reads td5re_release.ini instead (never this file).
;  Readers live in main.c (td5_ini_int / td5_ini_str).
; ============================================================================

; ====================  USER SETTINGS  =======================================

[Display]
Width          =2560
Height         =1351
Windowed       = 1      ; 1 = windowed, 0 = fullscreen
Fogging        =1
SpeedUnits     =1
CameraDamping  =5
DisplayMode    =0
WindowMode=1
VSync=1
ShowFps=1
; ViewDistance: track draw distance 0-100% (maps to the pause-menu VIEW slider).
; 100 = port default (longest); original game used 65. Dense TD6 tracks (London,
; Egypt) are auto-capped to 65 internally regardless of this value to fix their
; render lag; a value BELOW the cap still applies everywhere.
ViewDistance=100

[Audio]
SFXVolume      =0
MusicVolume    =80
SFXMode        =0

[GameOptions]
Laps             =0
CheckpointTimers =0
Traffic          =4
Cops             =1
Difficulty       =2
Dynamics         =0
Collisions       =1
AntiTunnel       =1    ; 1 = S17 position-only anti-interpenetration pass (default).
                       ; Profiled negligible even at 16 cars; leave on.

; AutoGearbox: 1 = automatic transmission (default, mirrors orig Quick Race
; default; gear up/down keys are ignored). 0 = manual (player gear keys are
; honored, mirrors orig manual-toggle state). Drives input bit 28 →
; actor+0x378 which UpdatePlayerVehicleControlState gates the gear-shift
; block on. The original's menu toggle is not wired in the port, so this
; INI key is the only way to switch.
AutoGearbox      =1

; RearImpactResponse: % of the car-vs-car angular response (yaw spin + heavy-
; impact scatter/lift) kept when YOU (a human player) are hit on the REAR.
; 100 = byte-faithful original; lower = gentler. Default 45 turns getting
; rear-ended from an uncontrollable spin-out into a recoverable nudge. Only the
; victim's spin is softened — front/side hits, the attacker, and all AI/traffic
; collisions stay faithful; the forward shove of the bump is also unchanged.
RearImpactResponse = 45

; CatchupAssist: AI "catchup" / rubber-band assist (slows AI when you fall behind,
; speeds them up when you pull ahead). -1 = use the in-game Multiplayer Options
; toggle (default ON, softened); 0 = off; 1..9 = on. When >=0 this overrides the
; in-game toggle. The strength is softened vs the original so it no longer
; yo-yos the player. [S06]
CatchupAssist    = -1
; AIAccelFromCar: 1 = AI opponents and traffic derive their acceleration and top
; speed from each car's OWN carparam.dat (difficulty still scales the result),
; instead of a single difficulty-only constant. 0 = faithful template behaviour. [S06]
AIAccelFromCar   = 1

PlayerIsAI       = 0    ; (harness) 0 = user drives; 1 = slot 0 driven by AI
Powerups=1

; ====================  DEVELOPER / TEST HARNESS  ============================
;  Everything below is for development + RE diffing. The release build hard-
;  disables these in code, and td5re_release.ini omits them entirely.

[Game]
DefaultCar       = 0    ; index into cardef table (0 = first car)
DefaultTrack     = 19    ; 5 = Newcastle (level029.zip)
DefaultGameType  = 9    ; 0 = Single Race (live; opponents suppressed via harness)
DefaultOpponents = 5    ; [S06 capture] full AI grid so catchup/per-car AI logs fire
; SpectateScreens (dev/profiling): render the first N AI cars (slots 1..N) each
; in their own split-screen viewport pane, on top of the player's pane. Total
; panes = 1 + N. AutoRace applies this after the schedule (the Quick Race
; "AI Screens" selector is the interactive equivalent). 0 = off. Clamped to the
; AI field (DefaultOpponents) and the 9-viewport cap. Release build forces 0.
SpectateScreens  = 0
SkipIntro        = 1    ; 1 = bypass FMV intro at startup
DebugOverlay     = 1    ; 1 = HUD debug text overlay enabled
AutoRace        = 1     ; [PROFILE] boot to frontend menu so the frontend is profiled too
StartSpanOffset  = 0    ; (drive to span 300)
DefaultReverse   = 0

[Debug]
; Runtime debug toggles. F12 in-race also toggles the collision overlay
; per CLAUDE.md "Debug shortcuts" section.
Collisions       = 0    ; 1 = render collision wireframe overlay (F12 also toggles)
EnableBenchmark  = 0    ; 1 = enable benchmark mode hooks (td5_benchmark.c)

[Trace]
; CSV race-trace harness (td5_trace.c) — dev diagnostics.
RaceTrace            = 0
RaceTraceSlot        = -1
RaceTraceMaxFrames   = 300
AutoThrottle         = 0
AutoThrottleValue    = 0
AutoThrottleStopSpan = 0
TraceFastForward     = 1.0
RaceTraceMaxSimTicks = 0
ExperimentalBiasClamp = 0   ; 1 = run pre-loop bias/clamp chain byte-faithfully (UpdateRaceActors @ 0x00436A70)
TrafficEdgePen       = 0    ; 1 = mirror orig traffic_edge_pen probe to tools/frida_csv/traffic_edge_pen_port.csv
                            ;     (pair with tools/_probes/traffic_edge_pen_probe.js for orig CSV)
TerrainCamProbe      = 1    ; 1 = mirror orig UpdateChaseCamera (0x00401590) terrain probes (norm_a/b/c_y +
                            ;     pitch/roll inputs) to tools/frida_csv/terrain_probe_port.csv. Pairs with
                            ;     tools/_probes/terrain_probe_capture.js. Confirms whether port's 3-point
                            ;     terrain normal probes (24.8 FP) match orig units before restoring the
                            ;     AngleFromVector12 derivation at td5_camera.c:752-754.
Modules              = *    ; comma-separated subset: frame,pose,motion,track,controls,progress,view,calls (or "*")
Stages               = *    ; comma-separated subset: frame_begin,pre_physics,post_physics,post_ai,post_track,post_camera,post_progress,frame_end,pause_menu,countdown (or "*")

[Replay]
PersistToDisk    = 0    ; 1 = persist race replay buffer to disk (debug)

[Logging]
Enabled          = 1    ; master toggle for all log channels
MinLevel         = 0    ; [PROFILE] WARN+ only: drops DEBUG/INFO spam so logging
                        ; overhead doesn't contaminate the per-zone timings.
                        ; PROFILE lines are emitted at WARN so they still pass.
Frontend         = 1    ; silence HUD speedo spam
Race             = 1    ; [PROFILE] silence AI/physics WARN spam (own channel)
Engine           = 1    ; [PROFILE] REQUIRED: PROFILE lines (tag "plat") -> engine.log
Wrapper          = 0    ; 1 = log every ddraw_wrapper API call (very verbose)
Profile          = 1    ; [PROFILE] per-phase frame profiler -> engine.log, 1 line/sec
[CarSelection]
TD6PaintColor=16764992
[Network]
Nickname=Nanofives

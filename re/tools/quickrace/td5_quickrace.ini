[race]
; game_type:
;   0 = Single Race
;   1 = Championship Cup (4 races)
;   2 = Era Cup (6 races, forces 4 circuit laps)
;   3 = Challenge Cup
;   4 = Pitbull Cup
;   5 = Masters Cup
;   6 = Ultimate Cup
;   7 = Time Trials (forces manual transmission, no traffic)
;   8 = Cop Chase (wanted mode, cop cars 33-36 only)
;   9 = Drag Race
game_type = 0

; Track index: see TRACK REFERENCE above. Use -1 for the drag strip.
track = 0

; Direction: 0 = forwards, 1 = backwards (track must support reverse).
direction = 0

; Circuit laps. Era cup (type 2) overwrites this to 4 via ConfigureGameTypeFlags.
laps = 3

; Shift every actor's spawn span by this many units along the track ring.
; Positive values start the field further down the road; negative goes back.
; 0 = vanilla starting grid. The default 6-car grid keeps its relative spacing
; (-3, -6, -9, -12, -15 spans from the lead) — only the base span moves.
; Hooks InitializeActorTrackPose (0x00434350) to rewrite the span arg at call
; time; no other state needs patching — heading, route progress and lateral
; offset are all rederived from the new span by the init itself.
;
; Quick ranges for Moscow (track=0, circuit, ring length ~3140 spans):
;   base start span = 120
;   +500   → middle of sector 1 (still pre-CP0 at 869)
;   +750   → right before CP0
;   +1400  → pre-CP1 (1511)
;   +1900  → mid sector 3
;   +2500  → pre-CP3 (2618)
; Every track has a different ring length; overshooting wraps at the end of
; the span ring (span N mod ring_length).
start_span_offset = 380

[car]
; Car index: see CAR REFERENCE above. Indices 0-15 are always unlocked.
car = 0

; Paint job 0..3 (cop cars have no variants).
paint = 0

; 0 = automatic, 1 = manual. Time Trials (type 7) is forced manual.
transmission = 0

[drag]
; Drag-race-only opponent car index. Written to DAT_00463e08 (the slot the
; drag-race engine reads for the single AI opponent's car type). Ignored
; when game_type is not 9. Accepts the same car indices as car.car above.
opponent_car = 0

[frontend]
; Jump directly to a specific frontend screen instead of launching a race.
; -1 = disabled (normal quickrace behavior — bypasses frontend entirely).
; 0-29 = jump to that screen after intro/legal bypass; race is NOT started.
; Use this to test individual frontend screens in the original binary.
; Screen index reference (same as original's screen table at 0x4655C4):
;   0=LocalizationInit  1=PositionerDebug  2=AttractMode    3=LanguageSelect
;   4=LegalCopyright    5=MainMenu         6=RaceTypeMenu   7=QuickRace
;   8=ConnectionBrowser 9=SessionPicker   10=CreateSession  11=NetworkLobby
;  12=OptionsHub       13=GameOptions     14=ControlOptions 15=SoundOptions
;  16=DisplayOptions   17=TwoPlayerOpts   18=ControllerBinding 19=MusicTest
;  20=CarSelection     21=TrackSelection  22=ExtrasGallery  23=HighScore
;  24=RaceResults      25=NameEntry       26=CupFailed      27=CupWon
;  28=StartupInit      29=SessionLocked
frontend_screen = 12

[launcher]
; Process name under original/. Leave as default unless renamed.
exe = TD5_d3d.exe

; When true, the hook script prints each global write + call for troubleshooting.
verbose = false

; When true, attach probes on LoadTrackRuntimeData (0x42fb90) and
; InitializeActorTrackPose (0x434350) so the hook logs the resolved level ZIP
; number and every actor spawn (slot, span, lane). Useful for confirming
; track=-1 actually loaded level030.zip or that start_span_offset landed the
; grid where you expected. Enables regardless of verbose.
trace_track_load = false

; Bypass the frontend entirely when td5re.exe reads this file — the source
; port's auto_race + skip_intro paths fire on boot and jump straight to the
; configured race. Ignored by the original-game Frida launcher (which always
; bypasses the frontend anyway).
skip_frontend = true

; When true, the Frida hook makes slot 0 (the player) AI-driven in the
; original binary — mirrors td5re.ini [GameOptions] PlayerIsAI=1 on the
; port side. Implementation: hooks UpdateRaceActors (0x436a70) and writes
; gRaceSlotStateTable.slot[0].state=0 for the duration of the call, then
; restores it to 1 on return. Every other consumer (race-end detection,
; HUD, camera, g_humanPlayerCount readers) continues to see slot 0 as a
; normal human, so the race does not short-circuit on "no human active".
; See reference_frida_player_is_ai.md for why simpler approaches fail.
player_is_ai = false

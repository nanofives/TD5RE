; ============================================================================
;  td5re_release.ini — TD5RE source-port configuration (RELEASE: td5re_release.exe)
; ----------------------------------------------------------------------------
;  The release executable reads THIS file, never td5re.ini, so the dev build's
;  test-harness settings (AutoRace, StartScreen, PlayerIsAI, trace/debug knobs)
;  cannot leak into the shipping binary. Those developer toggles are also hard-
;  disabled in code for the release build, which is why the [Debug] and [Trace]
;  sections are intentionally absent here.
;
;  This file holds every tweakable SETTING. The binary Config.td5 / CupData.td5
;  save files have been retired; their data now lives in organized, editable
;  sibling files next to the executable:
;
;     td5re_input.ini      controller + keyboard bindings, device / FF config
;     td5re_progress.ini   high-score table, unlock / cheat / progression state
;     td5re_cup.ini        "Continue Cup" resume state
;
;  An existing Config.td5 / CupData.td5 is imported ONCE on first launch and
;  then renamed to *.migrated (kept as a backup, never read again).
; ============================================================================

[Display]
Width          =2048
Height         =1081
Windowed       = 1      ; 1 = windowed, 0 = exclusive fullscreen
Fogging        =1
SpeedUnits     =1
CameraDamping  =5
DisplayMode    =0
WindowMode=1
VSync=1
ShowFps=1
                        ; resolution still comes from Width/Height above)

[Audio]
SFXVolume      =12
MusicVolume    =80
SFXMode        =0

[GameOptions]
Laps             =0
CheckpointTimers =0
Traffic          =1
Cops             =0
Difficulty       =0
Dynamics         =0
Collisions       =1
AutoGearbox      =1
; RearImpactResponse: % of the rear-end car-vs-car angular response (spin/launch)
; kept for the human player. 100 = faithful; 45 (default) = recoverable nudge. [S08]
RearImpactResponse = 45
; CatchupAssist: AI rubber-band/catchup. -1 = use the in-game toggle (default
; ON, softened); 0 = off; 1..9 = on. [S06]
CatchupAssist    = -1
; AIAccelFromCar: 1 = AI/traffic accel + top speed from each car's carparam
; (difficulty still scales); 0 = faithful template behaviour. [S06]
AIAccelFromCar   = 1

[Game]
DefaultCar       = 0    ; index into the car table (0 = first car)
DefaultTrack     = 0    ; default track selection
DefaultGameType  = 0    ; 0 = Single Race
SkipIntro        = 1    ; 1 = bypass the FMV intro at startup

[Logging]
Enabled          = 0    ; quiet by default; set to 1 to capture a diagnostic log
MinLevel         = 2    ; 0 = trace, 1 = info, 2 = warn, 3 = error
Engine           = 0    ; 1 = log engine init/shutdown + D3D11 backend events
[CarSelection]
TD6PaintColor=1052927
[Network]
Nickname=Nanofives

; td5re_release.ini — TD5RE source-port RELEASE configuration.
;
; The release executable (td5re_release.exe) reads THIS file, never td5re.ini,
; so the dev build's test-harness settings (AutoRace, StartScreen, PlayerIsAI,
; trace knobs, debug overlays) cannot leak into the shipping binary. Those
; developer/trace/debug toggles are additionally hard-disabled in code for the
; release build, which is why the [Debug] and [Trace] sections are intentionally
; absent here — adding them would have no effect.

[Display]
Width          = 0      ; backbuffer width  (0 = use the desktop resolution)
Height         = 0      ; backbuffer height (0 = use the desktop resolution)
Windowed       = 1      ; 1 = windowed, 0 = exclusive fullscreen
Borderless     = 1      ; 1 = borderless window (with Width/Height=0 = fullscreen window)
Fogging        = 1      ; 1 = per-track distance fog (faithful), 0 = off
SpeedUnits     = 1      ; 0 = mph, 1 = kph
CameraDamping  = 5      ; lower = snappier camera, higher = smoother

[Audio]
SFXVolume      = 80     ; sound effects volume 0..100
MusicVolume    = 80     ; CD / replacement music volume 0..100
SFXMode        = 0      ; 0 = stereo, 1 = mono, 2 = 3D

[GameOptions]
Laps             = 0    ; 0 = use the track-default lap count
CheckpointTimers = 0    ; 1 = circuit/sprint checkpoint timer enabled
Traffic          = 0    ; 1 = AI traffic active during single race / cup
Cops             = 0    ; 1 = police present (Cop Chase mode requires this)
Difficulty       = 0    ; 0 = easy, 1 = medium, 2 = hard
Dynamics         = 0    ; 0 = sim, 1 = arcade
Collisions       = 1    ; 1 = vehicle + wall collisions enabled
AutoGearbox      = 1    ; 1 = automatic transmission, 0 = manual

[Game]
DefaultCar       = 0    ; index into the car table (0 = first car)
DefaultTrack     = 0    ; default track selection
DefaultGameType  = 0    ; 0 = Single Race
SkipIntro        = 1    ; 1 = bypass the FMV intro at startup

[Logging]
Enabled          = 0    ; quiet by default; set to 1 to capture a diagnostic log
MinLevel         = 2    ; 0 = trace, 1 = info, 2 = warn, 3 = error
Engine           = 0    ; 1 = log engine init/shutdown + D3D11 backend events

[Features]
; Restore cut random collision wobble + wheel shimmy (GetDamageRulesStub -> _rand)
DamageWobble=1

; Restore cut snow particle rendering (level003 only)
SnowRendering=1

; Widescreen + high-refresh-rate fix (replaces all 31 binary patches)
; Requires UNPATCHED original TD5_d3d.exe and M2DX.dll
; D3D11 wrapper handles windowed upscaling via StretchRect.
; WidescreenFix resolution patches conflict with the wrapper's surface architecture.
; The game renders at 640x480 internally, upscaled to window size by the D3D11 wrapper.
WidescreenFix=0

; Skip intro movie and legal splash screens
SkipIntro=1
SkipLegals=1

; Show debug overlay (FPS, speed, gear) during races
DebugOverlay=0

; Windowed mode via DXWin::Initialize hook (not needed when using a wrapper)
Windowed=0

; Replace bitmap font atlas with GDI text (crisp scalable text)
; Also scales race HUD text to match resolution
FontFix=1

[FontFix]
; Font family name (must match the TTF internal name if using FontFile)
; Family name is "Function", style "Bold" is selected via FontWeight
FontName=FunctionX
; Path to TTF file (relative to game exe, or absolute). Empty = system font.
FontFile=FunctionX Bold.ttf
; Font weight: 400=Normal, 700=Bold, 900=Black
FontWeight=700
; Font sizes in pixels (at 640x480 virtual resolution)
; Increase for larger text, decrease for smaller
; Original bitmap small font: 12px cells, large font: 36px cells
SmallFontSize=18
LargeFontSize=32

[Widescreen]
; Target resolution (0 = auto-detect native monitor resolution)
Width=0
Height=0

; 4:3 pillarbox mode: 1 = black bars on sides, 0 = stretch to fill
Pillarbox=1

; VSync in frontend/loading present (1 = WaitForVerticalBlank)
VSync=1

; Menu logic gate interval in ms (16 = ~60Hz, matches original design speed)
; 0 = no cap (animations run at frame rate, correct with VSync at 60Hz)
; Lower = faster menu animations, higher = slower
MenuFrameCap=0

[Windowed]
; Window client area size (used when Windowed=1)
Width=640
Height=480

; 1 = borderless (clean, no frame), 0 = captioned (title bar, classic borders)
; Note: Windows forces classic/retro borders on DirectDraw processes.
; Borderless recommended for best appearance.
Borderless=0

[AutoDump]
; Auto-cycle all tracks/cars to capture all textures
; Set Enable=1 and also create td5_png/dump_textures.flag
; The game will automatically load each track/car combo and exit
Enable=0
; Frames to stay in each race (300 = ~5 sec at 60fps, enough for full map load)
LoadFrames=300

[AssetDump]
; Save all files loaded from ZIP archives to a dump directory
; Files are saved in original format (TGA, DAT, etc.) organized by source
; Use re/tools/td5_dump_to_png.py to convert image files to PNG
Enable=0
; Dump directory (relative to CWD / data dir)
DumpDir=td5_dump
; Skip files already dumped (1 = skip, 0 = overwrite)
SkipExisting=1

[PngReplace]
; Replace TGA textures with PNG files at load time
; PNGs are decoded and converted to TGA format in memory
; Works with any rendering backend (D3D11 wrapper, DDrawCompat, native)
Enable=0
; Directory containing PNG files (relative to CWD / data dir)
PngDir=td5_png_clean

[AssetOverride]
; Load extracted loose files from assets/ directory instead of ZIPs
Enable=1
; Directory containing extracted assets (relative to CWD / data dir)
AssetsDir=assets

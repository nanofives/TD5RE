name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build-td5re.yml
    with:
      release: true
      run-lint: false
      artifact-name: td5re-release-${{ github.ref_name }}

  package-and-release:
    name: Package & Release
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download td5re.exe
        uses: actions/download-artifact@v4
        with:
          name: td5re-release-${{ github.ref_name }}
          path: dist/td5re

      - name: Package artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          cd dist
          7z a "td5re-${TAG}-win32.zip" td5re/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TD5RE ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/td5re-${{ github.ref_name }}-win32.zip
